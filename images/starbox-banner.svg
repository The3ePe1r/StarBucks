<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg 
  version="1.1"
  baseProfile="full"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 1200 550"
  preserveAspectRatio="xMidYMid slice"
  style="width: 100%; height: 550px; display: block; font-family: Vazir, Tahoma, sans-serif; direction: rtl">
  
  <defs>
    <!-- گرادینت پس‌زمینه -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006241;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1d3c1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2918;stop-opacity:1" />
    </linearGradient>
    
    <!-- گرادینت برای ستاره -->
    <radialGradient id="starGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
    </radialGradient>
    
    <!-- گرادینت برای دایره‌ها -->
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:0.2" />
    </linearGradient>
    
    <!-- فیلتر برای سایه -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- فیلتر برای نور -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- پترن زمینه -->
    <pattern id="coffeePattern" patternUnits="userSpaceOnUse" width="150" height="150">
      <circle cx="75" cy="75" r="20" fill="#006241" opacity="0.1"/>
      <circle cx="75" cy="75" r="30" fill="none" stroke="#006241" stroke-width="2" opacity="0.1"/>
      <path d="M40,75 Q75,40 110,75 Q75,110 40,75Z" fill="#006241" opacity="0.05"/>
    </pattern>
    
    <!-- تعریف فونت وزیر (برای سازگاری بیشتر) -->
    <style type="text/css">
      @import url('https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css');
      text {
        font-family: 'Vazir', Tahoma, sans-serif;
      }
    </style>
  </defs>
  
  <!-- پس‌زمینه با گرادینت -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- پترن زمینه -->
  <rect width="100%" height="100%" fill="url(#coffeePattern)" opacity="0.15"/>
  
  <!-- دایره‌های تزئینی پویا -->
  <circle cx="10%" cy="20%" r="80" fill="url(#circleGradient)" opacity="0.4"/>
  <circle cx="90%" cy="30%" r="120" fill="url(#circleGradient)" opacity="0.3"/>
  <circle cx="15%" cy="70%" r="100" fill="url(#circleGradient)" opacity="0.35"/>
  <circle cx="85%" cy="80%" r="90" fill="url(#circleGradient)" opacity="0.4"/>
  
  <!-- خطوط تزئینی -->
  <path d="M0,275 Q300,200 600,275 T1200,275" stroke="url(#circleGradient)" stroke-width="3" fill="none" opacity="0.2"/>
  <path d="M0,375 Q400,450 800,375 T1200,375" stroke="url(#circleGradient)" stroke-width="2" fill="none" opacity="0.15"/>
  
  <!-- طرح فنجان قهوه اصلی -->
  <g filter="url(#shadow)" transform="translate(800, 200)">
    <!-- دسته فنجان -->
    <path d="M100,0 C180,-10 200,30 190,100 C180,170 130,160 100,150" 
          fill="#8B4513" stroke="#5D2906" stroke-width="4"/>
    
    <!-- بدنه فنجان -->
    <ellipse cx="0" cy="125" rx="120" ry="40" fill="#8B4513" stroke="#5D2906" stroke-width="4"/>
    <rect x="-120" y="0" width="240" height="125" rx="15" ry="15" 
          fill="#8B4513" stroke="#5D2906" stroke-width="4"/>
    
    <!-- داخل فنجان (قهوه) -->
    <ellipse cx="0" cy="5" rx="100" ry="30" fill="#4A2C1D"/>
    
    <!-- بخار قهوه -->
    <path d="M-30,-50 C-40,-90 -10,-110 10,-130 C30,-150 50,-170 70,-180" 
          stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M0,-60 C-10,-100 20,-120 40,-140 C60,-160 80,-180 100,-190" 
          stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M30,-40 C20,-80 50,-100 70,-120 C90,-140 110,-160 130,-170" 
          stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
  
  <!-- لوگوی ستاره مرکزی -->
  <g filter="url(#glow)" transform="translate(400, 275)">
    <path d="M0,-75 L30,-10 L100,-10 L50,35 L70,100 L0,60 L-70,100 L-50,35 L-100,-10 L-30,-10 Z" 
          fill="url(#starGradient)" stroke="#ff9900" stroke-width="4"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- متن اصلی "استار باکس" -->
  <g text-anchor="middle" filter="url(#shadow)">
    <text x="400" y="200" fill="white" font-size="85" font-weight="bold" letter-spacing="2">
      <tspan>استار</tspan>
    </text>
    <text x="400" y="290" fill="#ffd700" font-size="85" font-weight="bold" letter-spacing="2">
      <tspan>باکس</tspan>
    </text>
  </g>
  
  <!-- زیرنویس -->
  <text x="400" y="380" text-anchor="middle" fill="white" font-size="34" font-weight="300" opacity="0.9">
    <tspan>کیفیت بی‌نظیر، طعم فراموش‌نشدنی</tspan>
  </text>
  
  <!-- دکمه سفارش -->
  <g filter="url(#shadow)" transform="translate(400, 430)">
    <rect x="-110" y="-30" rx="35" ry="35" width="220" height="65" fill="#ffd700"/>
    <rect x="-110" y="-30" rx="35" ry="35" width="220" height="65" fill="none" stroke="#ff9900" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" fill="#006241" font-size="30" font-weight="bold">
      <tspan>سفارش آنلاین</tspan>
    </text>
  </g>
  
  <!-- آیکون‌های دانه قهوه -->
  <g fill="#ffd700" opacity="0.7">
    <ellipse cx="100" cy="100" rx="15" ry="9" transform="rotate(30 100 100)"/>
    <ellipse cx="1100" cy="450" rx="18" ry="11" transform="rotate(-15 1100 450)"/>
    <ellipse cx="250" cy="500" rx="12" ry="7" transform="rotate(45 250 500)"/>
    <ellipse cx="950" cy="80" rx="14" ry="8" transform="rotate(-30 950 80)"/>
  </g>
  
  <!-- برچسب ویژه -->
  <g transform="translate(1100, 100)">
    <path d="M-80,-40 Q-40,-80 0,-40 L0,40 Q-40,80 -80,40 Z" fill="#ff3333" stroke="#cc0000" stroke-width="3"/>
    <text x="-40" y="5" text-anchor="middle" fill="white" font-size="22" font-weight="bold">
      <tspan>جدید</tspan>
    </text>
  </g>
</svg>