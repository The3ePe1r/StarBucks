<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | استارباکس</title>
    <link rel="icon" type="image/png" href="../images/image.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header id="header">
  <div class="header-inner">
    <div class="logo">
        <a href="home.html">
            <img src="../images/image.png" alt="لوگو استار باکس">
        </a>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="جستوجوی محصولات">
      <div id="searchResults" class="search-results">
      </div>
    </div>
    <nav id="buttons">
      <a href="home.html">خانه</a>
      <a href="about.html">درباره</a>
      <a href="products.html">خدمات</a>
      <a href="contact.html">تماس</a>
    </nav>
  </div>
</header>



    <main class="auth-page-wrapper">
        <div class="auth-form-box">
            <div class="auth-form-container">
                <h2>ورود به حساب کاربری</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="loginEmail" placeholder="ایمیل یا نام کاربری" required>
                        <label for="loginEmail">ایمیل یا نام کاربری</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="رمز عبور" required>
                        <label for="loginPassword">رمز عبور</label>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe"> مرا به خاطر بسپار
                        </label>
                        <a href="#">فراموشی رمز عبور؟</a>
                    </div>
                    <button type="submit" class="btn auth-button">ورود</button>
                </form>
                <p class="form-switch">حساب کاربری ندارید؟ <a href="signup.html">ثبت‌نام کنید</a></p>
            </div>
        </div>
    </main>


    <script src="../JS/script.js"></script>
</body>
</html>
