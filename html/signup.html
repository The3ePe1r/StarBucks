<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود / ثبت‌نام | استارباکس</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../images/image.png">
</head>
<body>

<header id="header">
  <div class="header-inner">
    <div class="logo">
        <a href="home.html">
            <img src="../images/image.png" alt="لوگو استار باکس">
        </a>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="جستوجوی محصولات">
      <div id="searchResults" class="search-results">
      </div>
    </div>
    <nav id="buttons">
      <a href="home.html">خانه</a>
      <a href="about.html">درباره</a>
      <a href="products.html">خدمات</a>
      <a href="contact.html">تماس</a>
    </nav>
  </div>
</header>


    <main class="auth-page-wrapper">
        <div class="auth-form-box">
            <div class="auth-form-container">
                <h2>ثبت‌نام در استارباکس</h2>
                <form id="signupForm">
                    <div class="form-group">
                        <input type="text" id="signupName" placeholder="نام و نام خانوادگی" required>
                        <label for="signupName">نام و نام خانوادگی</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="signupEmail" placeholder="ایمیل" required>
                        <label for="signupEmail">ایمیل</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupPassword" placeholder="رمز عبور" required>
                        <label for="signupPassword">رمز عبور</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupConfirmPassword" placeholder="تکرار رمز عبور" required>
                        <label for="signupConfirmPassword">تکرار رمز عبور</label>
                    </div>
                    <button type="submit" class="btn auth-button">ساخت حساب کاربری</button>
                </form>
                <p class="form-switch">قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html">وارد شوید</a></p>
            </div>
        </div>
    </main>


    <script src="../JS/script.js"></script>
</body>
</html>
